name: Placement Radar Automated Pipeline

on:
  schedule:
    # Run every 2 hours at the top of the hour.
    # We use every 2 hours to prevent getting blocked too quickly by sources
    - cron: '0 */2 * * *'
  # Allow manual triggering
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to commit data/seen.json back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd placement-radar
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Placement Radar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
        run: |
          cd placement-radar
          python main.py

      - name: Commit and Push seen.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add placement-radar/data/seen.json
          # Commit will fail if seen.json hasn't changed. That's fine.
          git commit -m "chore(data): auto-update seen.json from pipeline" || echo "No changes to commit"
          git push
